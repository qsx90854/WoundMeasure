<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 34px "Microsoft JhengHei", "Noto Sans CJK TC", Arial, sans-serif; fill: #111827; }
      .subtitle { font: 500 18px "Microsoft JhengHei", "Noto Sans CJK TC", Arial, sans-serif; fill: #475569; }
      .box { fill: #ffffff; stroke: #334155; stroke-width: 2.4; rx: 14; }
      .gate { fill: #fff7ed; stroke: #c2410c; stroke-width: 2.4; rx: 14; }
      .calc { fill: #eff6ff; stroke: #2563eb; stroke-width: 2.4; rx: 14; }
      .refine { fill: #ecfdf5; stroke: #059669; stroke-width: 2.4; rx: 14; }
      .output { fill: #f8fafc; stroke: #0f172a; stroke-width: 3; rx: 14; }
      .text { font: 600 22px "Microsoft JhengHei", "Noto Sans CJK TC", Arial, sans-serif; fill: #111827; }
      .small { font: 500 17px "Microsoft JhengHei", "Noto Sans CJK TC", Arial, sans-serif; fill: #475569; }
      .note { font: 600 18px "Microsoft JhengHei", "Noto Sans CJK TC", Arial, sans-serif; fill: #7c2d12; }
      .line { stroke: #334155; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 2.2; fill: none; stroke-dasharray: 8 7; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="0" y="0" width="1400" height="900" fill="#f8fafc"/>
  <text x="700" y="58" text-anchor="middle" class="title">v1 舊匹配流程：Grad-SIFT + Precise + EpiAlign + ECC</text>
  <text x="700" y="91" text-anchor="middle" class="subtitle">對應四個按鈕：嚴格精細匹配、梯度 SIFT 匹配、強制極線對齊、啟用 ECC 精修</text>

  <rect x="500" y="130" width="400" height="78" class="box"/>
  <text x="700" y="162" text-anchor="middle" class="text">使用者點選左圖量測點</text>
  <text x="700" y="190" text-anchor="middle" class="small">輸入：左圖座標 (u, v)、右圖候選幀、F / R / t / 平面資訊</text>

  <rect x="500" y="250" width="400" height="78" class="gate"/>
  <text x="700" y="282" text-anchor="middle" class="text">若靠近 ArUco 角點</text>
  <text x="700" y="310" text-anchor="middle" class="small">直接使用對應 ArUco corner</text>

  <rect x="80" y="365" width="350" height="118" class="calc"/>
  <text x="255" y="400" text-anchor="middle" class="text">RT / 平面幾何預估</text>
  <text x="255" y="430" text-anchor="middle" class="small">用外參與 marker 平面預測右圖位置</text>
  <text x="255" y="456" text-anchor="middle" class="small">作為粉紅十字中心 / 右圖搜尋 ROI</text>

  <rect x="525" y="365" width="350" height="118" class="calc"/>
  <text x="700" y="400" text-anchor="middle" class="text">梯度 SIFT 匹配</text>
  <text x="700" y="430" text-anchor="middle" class="small">左圖取高梯度 100 點 + 中梯度 100 點</text>
  <text x="700" y="456" text-anchor="middle" class="small">右圖取高梯度 200 點 + 中梯度 200 點</text>

  <rect x="970" y="365" width="350" height="118" class="calc"/>
  <text x="1145" y="400" text-anchor="middle" class="text">局部幾何估計</text>
  <text x="1145" y="430" text-anchor="middle" class="small">高梯度與中梯度各自估 m_pt</text>
  <text x="1145" y="456" text-anchor="middle" class="small">Affine / weighted offset 後再內插</text>

  <rect x="80" y="560" width="350" height="118" class="calc"/>
  <text x="255" y="595" text-anchor="middle" class="text">嚴格精細匹配</text>
  <text x="255" y="625" text-anchor="middle" class="small">若 Grad-SIFT 失敗才啟動</text>
  <text x="255" y="651" text-anchor="middle" class="small">warp 右圖後做 template matching 補救</text>

  <rect x="500" y="560" width="400" height="88" class="refine"/>
  <text x="700" y="595" text-anchor="middle" class="text">強制極線對齊</text>
  <text x="700" y="624" text-anchor="middle" class="small">將 m_pt 投影回 Fundamental Matrix 對應的極線</text>

  <rect x="500" y="700" width="400" height="88" class="refine"/>
  <text x="700" y="735" text-anchor="middle" class="text">啟用 ECC 精修</text>
  <text x="700" y="764" text-anchor="middle" class="small">以局部影像 patch 做平移式亞像素微調</text>

  <rect x="985" y="575" width="300" height="82" class="refine"/>
  <text x="1135" y="604" text-anchor="middle" class="text">ZNCC 品質評估</text>
  <text x="1135" y="632" text-anchor="middle" class="small">ZNCC / MaskedScore / 極線誤差</text>
  <text x="1135" y="652" text-anchor="middle" class="small">計算信心分數</text>

  <rect x="985" y="720" width="300" height="82" class="output"/>
  <text x="1135" y="754" text-anchor="middle" class="text">輸出右圖匹配點</text>
  <text x="1135" y="782" text-anchor="middle" class="small">後續進入三角化 / 深度計算</text>

  <path d="M700 208 L700 250" class="line"/>
  <path d="M700 328 L255 365" class="line"/>
  <path d="M430 424 L525 424" class="line"/>
  <path d="M875 424 L970 424" class="line"/>
  <path d="M1145 483 C1145 540 900 545 820 590" class="line"/>
  <path d="M700 648 L700 700" class="line"/>
  <path d="M900 744 C955 744 970 626 985 616" class="line"/>
  <path d="M1135 657 L1135 720" class="line"/>
  <path d="M1145 483 C1000 535 420 515 255 560" class="dash"/>
  <path d="M430 619 L500 604" class="dash"/>

  <text x="120" y="704" class="note">補救路徑：Grad-SIFT 找不到時</text>
  <!--text x="926" y="625" class="note">修正路徑：降低垂直極線誤差</text-->
</svg>
