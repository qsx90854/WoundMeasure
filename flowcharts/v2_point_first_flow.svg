<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 34px "Microsoft JhengHei", "Noto Sans CJK TC", Arial, sans-serif; fill: #111827; }
      .subtitle { font: 500 18px "Microsoft JhengHei", "Noto Sans CJK TC", Arial, sans-serif; fill: #475569; }
      .box { fill: #ffffff; stroke: #334155; stroke-width: 2.4; rx: 14; }
      .geo { fill: #eef2ff; stroke: #4f46e5; stroke-width: 2.4; rx: 14; }
      .search { fill: #ecfeff; stroke: #0891b2; stroke-width: 2.4; rx: 14; }
      .refine { fill: #ecfdf5; stroke: #059669; stroke-width: 2.4; rx: 14; }
      .reject { fill: #fff1f2; stroke: #e11d48; stroke-width: 2.4; rx: 14; }
      .output { fill: #f8fafc; stroke: #0f172a; stroke-width: 3; rx: 14; }
      .text { font: 600 22px "Microsoft JhengHei", "Noto Sans CJK TC", Arial, sans-serif; fill: #111827; }
      .small { font: 500 17px "Microsoft JhengHei", "Noto Sans CJK TC", Arial, sans-serif; fill: #475569; }
      .note { font: 600 18px "Microsoft JhengHei", "Noto Sans CJK TC", Arial, sans-serif; fill: #155e75; }
      .line { stroke: #334155; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 2.2; fill: none; stroke-dasharray: 8 7; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="0" y="0" width="1400" height="900" fill="#f8fafc"/>
  <text x="700" y="58" text-anchor="middle" class="title">v2 新匹配流程：Point First</text>
  <text x="700" y="91" text-anchor="middle" class="subtitle">先用幾何預測單一點，再在小範圍極線帶內搜尋與驗證</text>

  <rect x="500" y="125" width="400" height="78" class="box"/>
  <text x="700" y="157" text-anchor="middle" class="text">使用者點選左圖量測點</text>
  <text x="700" y="185" text-anchor="middle" class="small">輸入：左圖座標 (u, v)、右圖候選幀、F / R / t / marker 平面</text>

  <rect x="500" y="245" width="400" height="92" class="geo"/>
  <text x="700" y="280" text-anchor="middle" class="text">幾何預測右圖 seed</text>
  <text x="700" y="309" text-anchor="middle" class="small">有平面：PlaneSeed / Homography</text>
  <text x="700" y="331" text-anchor="middle" class="small">無平面：RawSeed fallback</text>

  <rect x="500" y="385" width="400" height="92" class="search"/>
  <text x="700" y="420" text-anchor="middle" class="text">建立 seed 周圍搜尋 ROI</text>
  <text x="700" y="449" text-anchor="middle" class="small">以 RIGHT_PATCH_SEARCH_RADIUS 限制搜尋範圍</text>

  <rect x="105" y="520" width="360" height="118" class="search"/>
  <text x="285" y="555" text-anchor="middle" class="text">極線帶 patch search</text>
  <text x="285" y="585" text-anchor="middle" class="small">沿 Fundamental Matrix 極線附近搜尋</text>
  <text x="285" y="611" text-anchor="middle" class="small">Descriptor + ZNCC 綜合分數挑最佳點</text>

  <rect x="520" y="520" width="360" height="118" class="refine"/>
  <text x="700" y="555" text-anchor="middle" class="text">小範圍 ECC 精修</text>
  <text x="700" y="585" text-anchor="middle" class="small">金字塔式 ECC 做亞像素平移微調</text>
  <text x="700" y="611" text-anchor="middle" class="small">若分數變差太多就拒絕 ECC 結果</text>

  <rect x="935" y="520" width="360" height="118" class="refine"/>
  <text x="1115" y="555" text-anchor="middle" class="text">極線對齊與 ROI 檢查</text>
  <text x="1115" y="585" text-anchor="middle" class="small">投影回極線，確認仍在搜尋 ROI 內</text>
  <text x="1115" y="611" text-anchor="middle" class="small">避免 ECC 飄到不合理位置</text>

  <rect x="180" y="695" width="320" height="94" class="reject"/>
  <text x="340" y="724" text-anchor="middle" class="text">ZNCC 品質評估</text>
  <text x="340" y="752" text-anchor="middle" class="small">ZNCC / MaskedScore / 極線誤差</text>
  <text x="340" y="772" text-anchor="middle" class="small">計算信心分數</text>

  <rect x="540" y="695" width="340" height="94" class="refine"/>
  <text x="710" y="730" text-anchor="middle" class="text">周圍特徵小幅微調</text>
  <text x="710" y="759" text-anchor="middle" class="small">Neighbor SIFT；過大位移或分數下降則拒絕</text>

  <rect x="920" y="695" width="320" height="94" class="output"/>
  <text x="1080" y="730" text-anchor="middle" class="text">輸出右圖匹配點</text>
  <text x="1080" y="759" text-anchor="middle" class="small">PointFirst + EpiAlign + FinalScore</text>

  <path d="M700 203 L700 245" class="line"/>
  <path d="M700 337 L700 385" class="line"/>
  <path d="M700 477 C700 502 350 493 285 520" class="line"/>
  <path d="M465 579 L520 579" class="line"/>
  <path d="M880 579 L935 579" class="line"/>
  <path d="M1115 638 C1115 690 420 670 340 695" class="line"/>
  <path d="M500 742 L540 742" class="line"/>
  <path d="M880 742 L920 742" class="line"/>
  <path d="M285 638 C210 685 235 738 180 742" class="dash"/>

  <text x="120" y="680" class="note">搜尋失敗或分數過低：回傳 PointFirst-Failed</text>
  <text x="830" y="675" class="note">核心差異：先鎖定「這個點」的合理落點，再只允許小幅特徵修正</text>
</svg>
